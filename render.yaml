services:
  - type: web
    name: arcompletions-api
    runtime: native
    buildCommand: "dotnet restore && dotnet publish -c Release -o out"
    startCommand: "dotnet out/ARCompletions.dll --urls http://0.0.0.0:$PORT"
    envVars:
      - key: DB_PATH
        value: /var/data/app.db
      - key: RUN_MIGRATIONS
        value: "true"
      # If you use Postgres on Render, set DATABASE_URL here or in the dashboard
      # - key: DATABASE_URL
      #   value: 'postgres://user:pass@host:5432/dbname'
    disk:
      name: data-disk
      mountPath: /var/data
      sizeGB: 1
    autoDeploy: true
